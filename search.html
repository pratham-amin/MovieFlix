  <script>
    const searchInput = document.querySelector('.search-box');
    const genreSelect = document.querySelector('.genre-select');
    const searchButton = document.querySelector('.btn-pink');
    const movies = document.querySelectorAll('.thumb-box');
    const sections = document.querySelectorAll('.movie-section');
    const noResults = document.getElementById('noResults');

    function filterMovies() {
      const searchText = searchInput.value.toLowerCase();
      const selectedGenre = genreSelect.value.toLowerCase();

      // ✅ RESET (important)
      if (searchText === "" && selectedGenre === "all") {
        sections.forEach(section => section.style.display = "block");
        movies.forEach(movie => movie.parentElement.style.display = "block");
        noResults.style.display = "none";
        return;
      }

      let anyMovieVisible = false;

      sections.forEach(section => {
        let hasVisibleMovie = false;

        const movieCols = section.querySelectorAll('.col-6.col-md-3');

        movieCols.forEach(col => {
          const movie = col.querySelector('.thumb-box');
          const title = movie.dataset.title.toLowerCase();
          const genre = movie.dataset.genre.toLowerCase().trim();

          const matchesText = title.includes(searchText);
          const matchesGenre = selectedGenre === "all" || genre === selectedGenre;

          if (matchesText && matchesGenre) {
            col.style.display = "block";
            hasVisibleMovie = true;
            anyMovieVisible = true;
          } else {
            col.style.display = "none";
          }
        });

        section.style.display = hasVisibleMovie ? "block" : "none";
      });

      noResults.style.display = anyMovieVisible ? "none" : "block";
    }


    searchButton.addEventListener('click', filterMovies);
    searchInput.addEventListener('keyup', filterMovies);
    genreSelect.addEventListener('change', filterMovies);
  </script>
